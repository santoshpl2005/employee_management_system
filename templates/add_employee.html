{% extends 'base.html' %}
{% block title %}Add Employee{% endblock %}

{% block content %}
    <h3 class="mb-4">Add New Employee</h3>

    <form method="POST" action="{{ url_for('add_employee') }}" class="row g-3">

        <div class="col-md-6">
            <label class="form-label">Full Name *</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control">
        </div>

        <div class="col-md-6">
            <label class="form-label">Department *</label>
            <input type="text" name="department" class="form-control" required placeholder="e.g. IT, HR, Finance">
        </div>

        <div class="col-md-6">
            <label class="form-label">Position *</label>
            <input type="text" name="position" class="form-control" required placeholder="e.g. Software Engineer">
        </div>

        <div class="col-md-6">
            <label class="form-label">Salary (₹) *</label>
            <input type="number" step="0.01" name="salary" class="form-control" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Date of Joining</label>
            <input type="date" name="date_of_joining" class="form-control">
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-success">Save Employee</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>
{% endblock %}
