{% extends 'base.html' %}
{% block title %}Edit Employee{% endblock %}

{% block content %}
    <h3 class="mb-4">Edit Employee: {{ employee['name'] }}</h3>

    <form method="POST" action="{{ url_for('edit_employee', emp_id=employee['id']) }}" class="row g-3">

        <div class="col-md-6">
            <label class="form-label">Full Name *</label>
            <input type="text" name="name" class="form-control" value="{{ employee['name'] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input type="email" name="email" class="form-control" value="{{ employee['email'] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ employee['phone'] or '' }}">
        </div>

        <div class="col-md-6">
            <label class="form-label">Department *</label>
            <input type="text" name="department" class="form-control" value="{{ employee['department'] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Position *</label>
            <input type="text" name="position" class="form-control" value="{{ employee['position'] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Salary (₹) *</label>
            <input type="number" step="0.01" name="salary" class="form-control" value="{{ employee['salary'] }}" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Date of Joining</label>
            <input type="date" name="date_of_joining" class="form-control" value="{{ employee['date_of_joining'] or '' }}">
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-warning">Update Employee</button>
            <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>

    </form>
{% endblock %}
